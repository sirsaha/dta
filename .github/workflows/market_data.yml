name: Fetch Market Data

on:
  schedule:
    # Runs hourly during NSE market hours (9:15 AM - 3:30 PM IST = 3:45 AM - 10:00 AM UTC)
    - cron: '0 4,5,6,7,8,9,10 * * 1-5'  # Mon-Fri, hourly 4-10 UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch market data
        run: python scripts/fetch_market_data.py

      - name: Commit and push parquet files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market_data/
          git diff --staged --quiet || git commit -m "data: market data $(date -u +%Y-%m-%d_%H:%M)"
          git push
